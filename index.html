<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>J.A.R.V.I.S. Neural Link</title>
    <style>
        :root { --glow: #00d2ff; }
        body {
            margin: 0; height: 100vh; background: #000;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: var(--glow); font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        .arc-reactor {
            width: 140px; height: 140px; border-radius: 50%;
            border: 4px solid var(--glow); display: flex; 
            justify-content: center; align-items: center;
            box-shadow: 0 0 30px var(--glow), inset 0 0 15px var(--glow);
            cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .arc-reactor:active { transform: scale(0.9); }
        .inner-core { width: 45px; height: 45px; border-radius: 50%; background: var(--glow); box-shadow: 0 0 20px #fff; }
        #response-bubble {
            margin-top: 30px; padding: 20px; border: 1px solid var(--glow);
            border-radius: 12px; width: 85%; max-height: 40vh; overflow-y: auto;
            background: rgba(0, 210, 255, 0.03); display: none; line-height: 1.6;
            font-size: 0.95rem; text-shadow: 0 0 5px rgba(0, 210, 255, 0.3);
        }
        #status { margin-top: 20px; font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; opacity: 0.6; }
        .loader { width: 80%; height: 2px; background: #111; margin-top: 15px; position: relative; overflow: hidden; display: none; }
        .loader::after { content: ''; position: absolute; width: 40%; height: 100%; background: var(--glow); animation: scan 1.2s infinite ease-in-out; }
        @keyframes scan { 0% { left: -40%; } 100% { left: 100%; } }
    </style>
</head>
<body>

    <div class="arc-reactor" id="jarvisBtn"><div class="inner-core"></div></div>
    <div id="response-bubble">SYSTEM ONLINE</div>
    <div class="loader" id="loader"></div>
    <div id="status">AWAITING COMMAND</div>

    <script>
        const btn = document.getElementById('jarvisBtn');
        const statusText = document.getElementById('status');
        const bubble = document.getElementById('response-bubble');
        const loader = document.getElementById('loader');

        // NEWEST 2026 API KEY
        const API_KEY = "AIzaSyDwBmpDJhFZkZ4pUvN4hixLfIorTn7yn5w";
        const synth = window.speechSynthesis;

        // Sophisticated Voice Selection
        const jarvisSays = (text) => {
            bubble.innerText = text;
            bubble.style.display = 'block';
            synth.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            
            const voices = synth.getVoices();
            // Specifically looks for "Google UK English Male" or similar
            const jarvisVoice = voices.find(v => v.name.includes('UK') && v.name.includes('Male')) || 
                               voices.find(v => v.lang === 'en-GB') || 
                               voices[0];
            
            if (jarvisVoice) msg.voice = jarvisVoice;
            msg.rate = 0.95; // British sophistication
            msg.pitch = 0.85; // Masculine depth
            synth.speak(msg);
        };

        // Model cycling to bypass 404/400 errors
        async function fetchAI(promptText) {
            loader.style.display = 'block';
            statusText.innerText = "CALIBRATING MODELS...";
            
            // 2026 Stable Model List
            const models = ["gemini-3.1-flash-lite-preview", "gemini-3-flash-preview", "gemini-2.0-flash"];
            
            for (const model of models) {
                try {
                    const url = `https://generativelanguage.googleapis.com/v1/models/${model}:generateContent?key=${API_KEY}`;
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `You are J.A.R.V.I.S., a witty AI. Address user as Sir. ${promptText}` }] }]
                        })
                    });
                    const data = await response.json();
                    if (data.candidates) {
                        loader.style.display = 'none';
                        return data.candidates[0].content.parts[0].text;
                    }
                } catch (e) { console.warn(`Model ${model} unavailable.`); }
            }
            loader.style.display = 'none';
            return "Sir, it appears Google's regional servers are blocking our request. We may need to verify the API permissions.";
        }

        const handleAction = async (cmd) => {
            const input = cmd.toLowerCase();
            if (input.includes("youtube")) {
                jarvisSays("Redirecting to YouTube, Sir.");
                setTimeout(() => { window.location.href = "https://www.youtube.com"; }, 1500);
            } else if (input.includes("time")) {
                jarvisSays("The time is " + new Date().toLocaleTimeString() + ", Sir.");
            } else {
                const response = await fetchAI(cmd);
                jarvisSays(response);
            }
        };

        btn.addEventListener('click', () => {
            if (navigator.vibrate) navigator.vibrate(50);
            synth.speak(new SpeechSynthesisUtterance("")); // Mobile audio unlock
            const userIn = prompt("Awaiting Command, Sir:");
            if (userIn) handleAction(userIn);
        });

        // Pre-load voices for mobile
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => synth.getVoices();
        }
    </script>
</body>
</html>
