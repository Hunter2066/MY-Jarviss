<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>I.H.R.I.S. Neural Link</title>
    <style>
        :root { --glow: #00d2ff; --bg: #000; }
        body {
            margin: 0; height: 100vh; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: var(--glow); font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }
        .arc-reactor {
            width: 140px; height: 140px; border-radius: 50%;
            border: 4px solid var(--glow); display: flex; 
            justify-content: center; align-items: center;
            box-shadow: 0 0 35px var(--glow), inset 0 0 15px var(--glow);
            cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .arc-reactor:active { transform: scale(0.9); }
        .inner-core { width: 40px; height: 40px; border-radius: 50%; background: var(--glow); box-shadow: 0 0 25px #fff; }
        
        #response-bubble {
            margin-top: 30px; padding: 20px; border: 1px solid var(--glow);
            border-radius: 12px; width: 85%; max-height: 45vh; overflow-y: auto;
            background: rgba(0, 210, 255, 0.04); display: none; line-height: 1.6;
            font-size: 0.95rem; text-shadow: 0 0 5px rgba(0, 210, 255, 0.3);
        }
        #status { margin-top: 20px; font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; opacity: 0.6; }
        .loader { width: 80%; height: 2px; background: #111; margin-top: 15px; position: relative; overflow: hidden; display: none; }
        .loader::after { content: ''; position: absolute; width: 40%; height: 100%; background: var(--glow); animation: scan 1.2s infinite ease-in-out; }
        @keyframes scan { 0% { left: -40%; } 100% { left: 100%; } }
    </style>
</head>
<body>

    <div class="arc-reactor" id="ihrisBtn"><div class="inner-core"></div></div>
    <div id="response-bubble">I.H.R.I.S. ONLINE</div>
    <div class="loader" id="loader"></div>
    <div id="status">AWAITING INPUT</div>

    <script>
        const btn = document.getElementById('ihrisBtn');
        const statusText = document.getElementById('status');
        const bubble = document.getElementById('response-bubble');
        const loader = document.getElementById('loader');

        // NEW API KEY APPLIED
        const API_KEY = "AIzaSyDwBmpDJhFZkZ4pUvN4hixLfIorTn7yn5w";
        const synth = window.speechSynthesis;

        const ihrisSays = (text) => {
            bubble.innerText = text;
            bubble.style.display = 'block';
            synth.cancel();
            
            const msg = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices();
            
            // Priority: British Male profile
            const preferredVoice = voices.find(v => v.name.includes('UK') && v.name.includes('Male')) || 
                                   voices.find(v => v.lang === 'en-GB') || 
                                   voices[0];
            
            if (preferredVoice) msg.voice = preferredVoice;
            msg.rate = 0.95; 
            msg.pitch = 0.9; 
            synth.speak(msg);
        };

        async function fetchAI(promptText) {
            loader.style.display = 'block';
            statusText.innerText = "QUERYING I.H.R.I.S. CORE...";
            
            try {
                // Using v1beta for Gemini 1.5 Flash
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `System: You are I.H.R.I.S., a witty British AI assistant. Address the user as 'Sir'. Keep responses concise and sophisticated. Question: ${promptText}` }] }]
                    })
                });

                const data = await response.json();
                loader.style.display = 'none';

                if (data.error) {
                    console.error(data.error);
                    return "Sir, the neural link is experiencing a discrepancy. Error: " + data.error.message;
                }

                if (data.candidates && data.candidates[0].content) {
                    statusText.innerText = "CONNECTED";
                    return data.candidates[0].content.parts[0].text;
                } else {
                    return "Sir, the core is unresponsive. Please verify the uplink.";
                }
            } catch (e) {
                loader.style.display = 'none';
                return "Critical communication failure. Uplink severed, Sir.";
            }
        }

        const handleCommand = async (cmd) => {
            const input = cmd.toLowerCase().trim();
            if (input.includes("time")) {
                ihrisSays("The current time is " + new Date().toLocaleTimeString() + ", Sir.");
            } else if (input.includes("youtube")) {
                ihrisSays("Accessing YouTube, Sir.");
                setTimeout(() => { window.location.href = "https://www.youtube.com"; }, 1500);
            } else {
                const response = await fetchAI(cmd);
                ihrisSays(response);
            }
        };
