    <style>
        :root { --glow: #00d2ff; --bg: #000; }

            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: var(--glow); font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        .arc-reactor {
            width: 140px; height: 140px; border-radius: 50%;
            border: 4px solid var(--glow); display: flex; 
            justify-content: center; align-items: center;
            box-shadow: 0 0 35px var(--glow), inset 0 0 15px var(--glow);
            cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .arc-reactor:active { transform: scale(0.9); }
        .inner-core { width: 40px; height: 40px; border-radius: 50%; background: var(--glow); box-shadow: 0 0 25px #fff; }
        
        #response-bubble {
            margin-top: 30px; padding: 20px; border: 1px solid var(--glow);
            border-radius: 12px; width: 85%; max-height: 45vh; overflow-y: auto;
            background: rgba(0, 210, 255, 0.04); display: none; line-height: 1.6;
            font-size: 0.95rem; text-shadow: 0 0 5px rgba(0, 210, 255, 0.3);
        }
        #status { margin-top: 20px; font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; opacity: 0.6; }
        .loader { width: 80%; height: 2px; background: #111; margin-top: 15px; position: relative; overflow: hidden; display: none; }
        .loader::after { content: ''; position: absolute; width: 40%; height: 100%; background: var(--glow); animation: scan 1.2s infinite ease-in-out; }
        @keyframes scan { 0% { left: -40%; } 100% { left: 100%; } }
    </style>
</head>
